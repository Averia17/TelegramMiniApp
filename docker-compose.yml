services:
  frontend:
    container_name: "frontend"
    image: "frontend"
    build:
        context: ./frontend
        dockerfile: Dockerfile
    working_dir: "/home/node/app"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/home/node/app
      - /home/node/app/node_modules # remove node_modules from synchronization
    command: ["npm", "run", "dev", "--host"]
    stop_signal: SIGINT
    depends_on:
      - webhook
  frontend_battle:
    container_name: "frontend_battle"
    image: "frontend_battle"
    build:
      context: ./frontend/battle
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
  bot:
    container_name: "bot"
    image: "bot"
    stop_signal: SIGINT
    build:
      context: ./backend
      dockerfile: ./bot.Dockerfile
    volumes:
      - ./backend/src:/src/  # Volume for bot code
      - /var/app/miniapp:/src/public # Volume for static files, that are shared between bot and frontend
#    restart: always

    env_file:
      - .env

  pg_database:
    image: postgres:13-alpine
    container_name: pg_database
    ports:
      - "5452:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    container_name: "nginx"
    image: "nginx"
    build:
      context: nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - /var/app/miniapp:/src/public
    depends_on:
      - webhook
      - frontend
      - battle_service
      - battle_results_service
      - shop_api

  webhook:
    container_name: webhook
    build:
      context: ./backend
      dockerfile: web.Dockerfile
    volumes:
      - ./backend/src/miniapp:/app/src/miniapp
    ports:
      - "3779:8000"
    env_file:
      - .env
    depends_on:
      - pg_database
    restart: unless-stopped

  redis_cache:
    container_name: "redis_cache"
    image: redis:6.2-alpine
    restart: always
    command: redis-server --port $REDIS_PORT --save 20 1 --loglevel warning --requirepass $REDIS_PASSWORD
    env_file:
      - .env
    volumes:
      - cache:/data

  shop_db:
    image: postgres:13-alpine
    container_name: shop_db
    ports:
      - "5555:5432"
    env_file:
      - .env
    volumes:
      - shop_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  shop_api:
    container_name: shop_api
    build:
      context: ./backend
      dockerfile: shop.Dockerfile
    volumes:
      - ./backend/src/shop_service:/app/src/shop_service
    ports:
      - "8888:8000"
    env_file:
      - .env
    depends_on:
      battle_results_db:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.10
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3o6n8QrO2VZk5eY1hnA"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:9092,PLAINTEXT_HOST://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  battle_results_db:
    image: postgres:13-alpine
    container_name: battle_results_db
    ports:
      - "5462:5432"
    env_file:
      - backend/src/battle_results_service/.env
    volumes:
      - battle_results_data:/var/lib/postgresql/data
    restart: unless-stopped

  battle_results_service:
    container_name: battle_results_service
    build:
      context: ./backend
      dockerfile: battle_results.Dockerfile
    env_file:
      - backend/src/battle_results_service/.env
    depends_on:
      battle_results_db:
        condition: service_started
      kafka:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src/battle_results_service
          target: /app
          ignore:
            - tmp/

  battle_service:
    container_name: battle_service
    build:
      context: ./backend
      dockerfile: battle.Dockerfile
    volumes:
      - ./backend/src/battle_service:/app/src/battle_service
    ports:
      - "3780:8000"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  shop_db_data:
  battle_results_data:
  kafka_data:
  cache:
