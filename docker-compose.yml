services:
  frontend:
    container_name: "frontend"
    image: "frontend"
    build:
        context: ./frontend
        dockerfile: Dockerfile
    working_dir: "/home/node/app"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/home/node/app
      - /home/node/app/node_modules # remove node_modules from synchronization
    command: ["npm", "run", "dev", "--host"]
    stop_signal: SIGINT
    depends_on:
      - webhook
  frontend_battle:
    container_name: "frontend_battle"
    image: "frontend_battle"
    build:
      context: ./frontend/battle
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
  bot:
    container_name: "bot"
    image: "bot"
    stop_signal: SIGINT
    build:
      context: ./backend/src/miniapp/tgbot
      dockerfile: Dockerfile
    volumes:
      - ./backend/src:/src/  # Volume for bot code
      - /var/app/miniapp:/src/public # Volume for static files, that are shared between bot and frontend
#    restart: always

    env_file:
      - ".env"

    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  pg_database:
    container_name: "pg_database"
    image: postgres:13-alpine
    ports:
      - "5452:5432" # Change if you like! 5439 is external to container
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: "postgres -c max_connections=150 -c shared_buffers=512MB -c effective_cache_size=1536MB -c maintenance_work_mem=128MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=3495kB -c min_wal_size=1GB -c max_wal_size=4GB -c max_worker_processes=2 -c max_parallel_workers_per_gather=1 -c max_parallel_workers=2 -c max_parallel_maintenance_workers=1"
    env_file:
      - '.env'
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  nginx:
    container_name: "nginx"
    image: "nginx"
    build:
      context: nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - /var/app/miniapp:/src/public
    depends_on:
      - webhook
      - frontend
      - battle_service
  webhook:
    container_name: "webhook"
    image: "webhook"
    stop_signal: SIGINT
    build:
      context: ./backend/src/miniapp/webhook
      dockerfile: Dockerfile
    ports:
      - "3779:8000"
    volumes:
      - ./backend/src:/src
    restart: always
    env_file:
      - ".env"
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    depends_on:
      - pg_database

  redis_cache:
    container_name: "redis_cache"
    image: redis:6.2-alpine
    restart: always
    command: redis-server --port $REDIS_PORT --save 20 1 --loglevel warning --requirepass $REDIS_PASSWORD
    env_file:
      - ".env"
    volumes:
      - cache:/data

  shop_db:
    container_name: "shop_db"
    image: postgres:13-alpine
    ports:
      - "5555:5432"
    restart: always
    volumes:
      - shop_db_data:/var/lib/postgresql/data
    command: "postgres -c max_connections=150 -c shared_buffers=512MB -c effective_cache_size=1536MB -c maintenance_work_mem=128MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=3495kB -c min_wal_size=1GB -c max_wal_size=4GB -c max_worker_processes=2 -c max_parallel_workers_per_gather=1 -c max_parallel_workers=2 -c max_parallel_maintenance_workers=1"
    env_file:
      - '.env'
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  shop_api:
    container_name: "shop_api"
    image: "shop_api"
    stop_signal: SIGINT
    build:
      context: ./backend/src/shop_service
      dockerfile: Dockerfile
    ports:
      - "8888:8000"
    volumes:
      - ./backend/src/shop_service:/src
    restart: always
    env_file:
      - ".env"
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    depends_on:
      - shop_db
  kafka:
    image: confluentinc/cp-kafka:7.4.10
    container_name: kafka
    ports:
      - "9092:9092"
      - "29093:29093"
    environment:
      CLUSTER_ID: "MkU3o6n8QrO2VZk5eY1hnA"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: always
    container_name: kafka-ui
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: true
      KAFKA_CLUSTERS_0_AUDIT_TOPICAUDITENABLED: true
      KAFKA_CLUSTERS_0_AUDIT_CONSOLEAUDITENABLED: true

  battle_service:
    container_name: battle_service
    image: battle_service
    build:
      context: ./backend/src/battle_service
      dockerfile: Dockerfile
    ports:
      - "3780:8000"
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

volumes:
  pgdata: { }
  shop_db_data: { }
  cache: { }